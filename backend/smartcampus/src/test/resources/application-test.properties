# H2 in-memory database for tests (no MySQL needed)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Suppress open-in-view warning
spring.jpa.open-in-view=false

# Override system DB props so Dotenv isn't needed
DB_URL=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
DB_USERNAME=sa
DB_PASSWORD=

# Disable OAuth2 auto-config that requires real credentials
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.oauth2.client.servlet.OAuth2ClientAutoConfiguration

# JWT config for tests
app.jwt.secret=test-secret-key-for-unit-testing-only-must-be-256-bits-long
app.jwt.expiration=86400000

# Frontend URL
app.frontend.url=http://localhost:5173

# Dummy Google OAuth2 credentials (not used in unit tests)
spring.security.oauth2.client.registration.google.client-id=test-client-id
spring.security.oauth2.client.registration.google.client-secret=test-client-secret
spring.security.oauth2.client.registration.google.scope=openid,profile,email

app.seed.enabled=false
